{% extends "base.html" %}

{% block title %}Mot de passe oublié · Strava x Glucose{% endblock %}

{% block content %}
  <div class="card" style="max-width:520px; margin:0 auto;">
    <h2>Mot de passe oublié</h2>
    <p class="muted" style="margin-top:-6px;">
      Saisis ton email pour recevoir un lien de réinitialisation.
    </p>

    <form method="post" action="/ui/forgot-password" style="display:flex; flex-direction:column; gap:14px; margin-top:14px;">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <button type="submit">Envoyer le lien</button>
    </form>

    <div style="margin-top:12px;">
      <a href="/ui/login" style="color:var(--accent); text-decoration:none;">Retour à la connexion</a>
    </div>
  </div>
{% endblock %}
