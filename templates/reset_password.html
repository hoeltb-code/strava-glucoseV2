{% extends "base.html" %}

{% block title %}Nouveau mot de passe · Strava x Glucose{% endblock %}

{% block content %}
  <div class="card" style="max-width:520px; margin:0 auto;">
    <h2>Créer un nouveau mot de passe</h2>
    {% if email %}
      <p class="muted" style="margin-top:-6px;">Compte : {{ email }}</p>
    {% endif %}
    {% if error %}
      <p style="color:#dc2626; margin-top:10px;">{{ error }}</p>
    {% endif %}
    <form method="post" action="/ui/reset-password" style="display:flex; flex-direction:column; gap:14px; margin-top:14px;">
      <input type="hidden" name="token" value="{{ token }}">
      <div>
        <label for="password">Nouveau mot de passe</label>
        <input type="password" id="password" name="password" required>
        <label class="password-toggle">
          <input type="checkbox" onchange="togglePasswordField('password', this)">
          Afficher le mot de passe
        </label>
      </div>
      <div>
        <label for="confirm_password">Confirmer le mot de passe</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
        <label class="password-toggle">
          <input type="checkbox" onchange="togglePasswordField('confirm_password', this)">
          Afficher le mot de passe
        </label>
      </div>
      <button type="submit">Mettre à jour</button>
    </form>
  </div>
{% endblock %}

{% block extra_js %}
  <script>
    function togglePasswordField(id, checkbox) {
      const input = document.getElementById(id);
      if (!input) return;
      input.type = checkbox.checked ? 'text' : 'password';
    }
  </script>
{% endblock %}
